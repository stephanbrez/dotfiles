# yaml-language-server: $schema=https://raw.githubusercontent.com/runkids/skillshare/main/schemas/config.schema.json
sources:
  skills: /home/stephan/.config/agents/skills
  agents: /home/stephan/.config/agents/agents
mode: merge
targets:
  antigravity:
    skills:
      path: /home/stephan/.gemini/skills
      target_naming: standard
  claude:
    skills:
      path: ~/.local/share/claude-code/skills
      target_naming: standard
      exclude:
        - claude-only/*
    agents:
      path: ~/.local/share/claude-code/agents
  codex:
    skills:
      path: ~/.local/share/codex/skills
      mode: merge
      target_naming: standard
      exclude:
        - .system/*
        - codex-only/*
  cursor:
    skills:
      path: /home/stephan/.cursor/skills
      target_naming: standard
  opencode:
    skills:
      path: /home/stephan/.config/opencode/skills
      target_naming: standard
    agents:
      path: /home/stephan/.config/opencode/agents
      target_naming: standard
  universal:
    skills:
      path: /home/stephan/.agents/skills
      target_naming: standard
extras:
  - name: codex-agents
    source: ~/.config/agents/agents
    targets:
      - path: ~/.local/share/codex/agents
        flatten: true
        extension: codex-agents
  - name: rules
    targets:
      - path: ~/.local/share/claude-code/rules
        flatten: true
      - path: ~/.local/share/.codex/rules
        flatten: true
      - path: /home/stephan/.config/opencode/rules
        flatten: true
  - name: prompts
    targets:
      - path: ~/.local/share/claude-code/prompts
        flatten: true
      - path: ~/.local/share/.codex/prompts
        flatten: true
      - path: /home/stephan/.config/opencode/prompts
        flatten: true
  - name: commands
    targets:
      - path: ~/.local/share/claude-code/commands
      - path: ~/.gemini/commands
        extension: gemini-commands
ignore:
  - .DS_Store
  - .git/
  - __pycache__/
audit:
  block_threshold: CRITICAL
