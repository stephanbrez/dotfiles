# ═══════════════════════════════════════════════════════════════
# Package Configuration for Dotfiles Setup Script
# ═══════════════════════════════════════════════════════════════
# This file defines packages installed by the setup script
# Organized by distribution and installation mode

metadata:
  version: "1.0"
  description: "Package definitions for dotfiles setup script"
  updated: "2026-01-02"

# ═════ Common Packages (All Distros) ═════
common:
  # ─── npm global packages ───
  npm_packages:
    - defuddle
    - @tobilu/qmd
    - @openai/codex

  distro_packages:
    # ─── Command line tools ───
    - bat
    - btop
    - diffutils
    - direnv
    - file
    - fzf
    - gh
    - git
    - just
    - ripgrep
    - shellcheck
    - stow
    - tldr
    - tmux
    - trash-cli
    - zsh
    # ─── System/server tools ───
    - automake
    - bash-completion
    - ca-certificates
    - cmake
    - curl
    - e2fsprogs
    - ethtool
    - flatpak
    - gcc
    - gettext
    - meson
    - ninja-build
    - pipx
    - pkgconf
    - python3
    - python3-pip
    - unzip
    - wget
    # - wl-clipboard

    # ─── Fun ───
    - toilet

# ═════ Ubuntu-Specific Packages ═════
ubuntu:
  minimal:
    # ─── Distro packages for minimal install ───
    distro_packages:
      - apt-utils
      - build-essential
      - python3-dev
      - python3-venv
      - fd-find
      - silversearcher-ag
      - secure-delete
      - fonts-dejavu
      # - exfatprogs # Ubuntu 20.04+, earlier versions use exfat-fuse

    # Skip ALL third-party packages in minimal mode
    skip_third_party: true

  full:
    # ─── Distro packages for full install ───
    distro_packages:
      - apt-utils
      - build-essential
      - python3-dev
      - python3-venv
      - fd-find
      - silversearcher-ag
      - secure-delete
      - fonts-dejavu
      # - exfatprogs # Ubuntu 20.04+

    # ─── Third-party installations ───
    third_party:
      docker: false
      onepassword: false
      eza: true
      fastfetch: true
      lazydocker: true
      lazygit: true
      fzf_binary: true
      neovim_source: false
      uv: true
      wezterm: true
      zoxide: true
      mise: true
      pastel_binary: false

    # ─── Python/pipx packages ───
    # pipx_packages:

# ═════ Debian-Specific Packages ═════
debian:
  full:
    # ─── Distro packages for full install ───
    distro_packages:
      - apt-utils
      - build-essential
      - python3-dev
      - python3-venv
      - fd-find
      - silversearcher-ag
      - secure-delete
      - thefuck
      - ttf-dejavu # Different from Ubuntu (ttf- vs fonts-)
      - exfat-fuse # Debian uses exfat-fuse (not exfatprogs)

    # ─── Third-party installations ───
    third_party:
      docker: true
      onepassword: true
      eza: true
      fastfetch: true
      lazydocker: true
      lazygit: true
      fzf_binary: true
      neovim_source: true
      uv: true
      wezterm: true
      zoxide: true
      mise: true
      pastel_binary: false

    # ─── Python/pipx packages ───
    pipx_packages:
      #- docutils
      - emoji-fzf

# ═════ macOS-Specific Packages (Homebrew) ═════
macos:
  skip_common: true
  full:
    # ─── Distro packages (Homebrew formulae) ───
    # Note: macOS skips common.distro_packages (Linux-only packages)
    # All packages here use Homebrew formula names
    distro_packages:
      # ─── Command line tools ───
      - bat
      - btop
      - diffutils
      - file
      - fzf
      - gh
      - git
      - ripgrep
      - shellcheck
      - stow
      - tldr
      - tmux
      - trash-cli
      - zsh
      - fd # Homebrew name (not fd-find)
      - neovim # Homebrew has current version
      # ─── System/build tools ───
      - automake
      - bash-completion
      - cmake
      - curl
      - gcc
      - gettext
      - make
      - meson
      - ninja # Homebrew name (not ninja-build)
      - pkg-config # Homebrew name (not pkgconf)
      - python # Homebrew name (not python3); bundles pip
      - pipx
      - unzip
      - wget
      - ca-certificates
      # ─── Fun ───
      - toilet

    # ─── Third-party installations ───
    third_party:
      docker: true
      onepassword: true
      eza: true
      fastfetch: true
      lazydocker: true
      lazygit: true
      fzf_binary: false # fzf already installed via distro_packages
      neovim_source: false # neovim installed via distro_packages (brew)
      uv: true
      wezterm: true
      zoxide: true
      aerospace: true
      mise: true
      pastel_binary: false

# ═════ Fedora-Specific Packages ═════
fedora:
  full:
    # ─── Distro packages for full install ───
    distro_packages:
      - dejavu-fonts
      - exfat-utils
      - fd-find
      - the_silver_searcher # Different from ag
      - gnupg2
      - srm # Different from secure-delete
      - python3-neovim
      - neovim # Fedora has current version in repos

    # ─── Group packages ───
    group_packages:
      - Development Tools

    # ─── Third-party installations ───
    third_party:
      # docker: true
      # Note: 1password, eza, wezterm may not be available for Fedora
      # fastfetch: true
      # lazydocker: true
      # lazygit: true
      uv: true
      pastel_binary: false
      # wezterm: true
      # zoxide: true
